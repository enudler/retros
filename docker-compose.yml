services:
  retros:
    build: .
    ports:
      - "3333:3333"
    volumes:
      - retro-data:/app/data
    restart: unless-stopped
    environment:
      PORT: "3333"
      DB_PATH: "/app/data/retro.db"
      NODE_ENV: "production"
      # Copy these from your .env file or set them as secrets
      GOOGLE_CLIENT_ID:     "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      SESSION_SECRET:       "${SESSION_SECRET}"
      ADMIN_EMAIL:          "${ADMIN_EMAIL}"
      APP_URL:              "${APP_URL:-http://localhost:3333}"

volumes:
  retro-data:
