name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version — must match v1.2.3'
        required: true
        type: string
      notes:
        description: 'Release notes (optional, auto-generated if empty)'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push tag and create release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be in the format v1.2.3"
            exit 1
          fi

      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ inputs.version }}" -m "Release ${{ inputs.version }}"
          git push origin "${{ inputs.version }}"

      # Pushing the tag above triggers the docker.yml workflow automatically.
      # This step creates the visible GitHub Release entry.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          body: ${{ inputs.notes }}
          generate_release_notes: true
